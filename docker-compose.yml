version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: bun run dev
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    depends_on:
      - analytics-api

  analytics-api:
    build:
      context: ./services/analytics-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
